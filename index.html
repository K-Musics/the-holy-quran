<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI - Advanced Chat & Image Generator</title>
    
    <!-- Tailwind CSS for detailed styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for parsing Markdown from AI responses -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- DOMPurify for safely rendering HTML -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    
    <!-- Phosphor Icons for a clean, modern icon set -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        },
                        primary: {
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712; /* gray-950 */
            color: #f3f4f6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }

        /* Markdown Styles within AI Bubbles */
        .markdown-content p { margin-bottom: 0.75em; line-height: 1.6; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content strong { font-weight: 600; color: #fff; }
        .markdown-content code { background-color: rgba(0,0,0,0.3); padding: 0.2em 0.4em; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .markdown-content pre { background-color: rgba(0,0,0,0.4); padding: 1em; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; }
        .markdown-content pre code { background-color: transparent; padding: 0; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .markdown-content ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        .markdown-content a { color: #818cf8; text-decoration: underline; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .dot {
            animation: pulse-dot 1.4s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        .glass-panel {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="h-screen w-full flex overflow-hidden selection:bg-primary-500 selection:text-white">

    <div class="flex-1 flex flex-col w-full max-w-5xl mx-auto h-full relative shadow-2xl sm:border-x sm:border-gray-800 bg-gray-900/50">
        
        <!-- Header -->
        <header class="h-16 flex-shrink-0 flex items-center justify-between px-6 glass-panel z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-purple-600 flex items-center justify-center shadow-lg shadow-primary-500/20">
                    <i class="ph-fill ph-planet text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="font-semibold text-lg leading-tight tracking-wide text-white">Nova AI</h1>
                    <p class="text-xs text-primary-400 font-medium">Memory-Enabled Assistant</p>
                </div>
            </div>
            
            <!-- Generation Mode Toggle -->
            <div class="flex items-center bg-gray-950 rounded-lg p-1 border border-gray-800 shadow-inner">
                <button id="mode-text" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 bg-gray-800 text-white shadow" onclick="setMode('text')">
                    <i class="ph ph-chat-text text-lg"></i>
                    <span class="hidden sm:inline">Chat</span>
                </button>
                <button id="mode-image" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-200 text-gray-400 hover:text-white" onclick="setMode('image')">
                    <i class="ph ph-image text-lg"></i>
                    <span class="hidden sm:inline">Image</span>
                </button>
            </div>
        </header>

        <!-- Chat History Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 pb-32">
            <!-- Welcome Message -->
            <div class="flex flex-col items-center justify-center h-full text-center space-y-4 text-gray-400 opacity-80" id="welcome-screen">
                <div class="w-20 h-20 rounded-2xl bg-gray-800 border border-gray-700 flex items-center justify-center mb-2">
                    <i class="ph ph-sparkle text-4xl text-primary-400"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-200">Hello, I'm Nova.</h2>
                <p class="max-w-md text-sm leading-relaxed">
                    I'm your advanced AI assistant with memory. Ask me complex questions, write code, or switch to <strong>Image Mode</strong> to bring your ideas to life visually.
                </p>
            </div>
        </div>

        <!-- Input Area (Floating at bottom) -->
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-950 via-gray-900 to-transparent pt-12">
            <div class="max-w-4xl mx-auto glass-panel rounded-2xl p-2 flex items-end gap-2 shadow-xl border border-gray-700 focus-within:border-primary-500 transition-colors duration-300 relative">
                
                <textarea 
                    id="user-input" 
                    rows="1" 
                    class="w-full bg-transparent text-gray-100 placeholder-gray-500 text-sm sm:text-base resize-none focus:outline-none py-3 px-4 max-h-32"
                    placeholder="Message Nova... (Shift+Enter for new line)"
                ></textarea>
                
                <button id="send-btn" class="flex-shrink-0 w-12 h-12 rounded-xl bg-primary-600 hover:bg-primary-500 flex items-center justify-center text-white transition-all duration-200 shadow-md mb-1 mr-1 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="ph-fill ph-paper-plane-right text-xl"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration & State ---
        // The API Key will be automatically injected by the Canvas environment.
        const apiKey = ""; 
        
        // Internal memory for text conversation
        let textChatHistory = []; 
        let currentMode = 'text'; // 'text' or 'image'
        let isGenerating = false;

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const welcomeScreen = document.getElementById('welcome-screen');
        const btnModeText = document.getElementById('mode-text');
        const btnModeImage = document.getElementById('mode-image');

        // System Instruction to guide Nova's persona and detail level
        const systemInstruction = {
            parts: [{ 
                text: "You are Nova, an advanced, highly intelligent AI assistant. You provide very detailed, well-structured, and aesthetically pleasing responses. You use markdown extensively to format your answers (bolding key terms, using bullet points, and formatting code blocks). You are helpful, insightful, and remember the context of the conversation. If a user asks for an image, gently remind them they can use the 'Image' toggle at the top of the interface." 
            }]
        };

        // --- UI Interactions ---

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
        });

        // Handle Enter key to send
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        sendBtn.addEventListener('click', handleSend);


        function setMode(mode) {
            currentMode = mode;
            if (mode === 'text') {
                btnModeText.classList.add('bg-gray-800', 'text-white', 'shadow');
                btnModeText.classList.remove('text-gray-400');
                btnModeImage.classList.remove('bg-gray-800', 'text-white', 'shadow');
                btnModeImage.classList.add('text-gray-400');
                userInput.placeholder = "Message Nova... (Shift+Enter for new line)";
            } else {
                btnModeImage.classList.add('bg-gray-800', 'text-white', 'shadow');
                btnModeImage.classList.remove('text-gray-400');
                btnModeText.classList.remove('bg-gray-800', 'text-white', 'shadow');
                btnModeText.classList.add('text-gray-400');
                userInput.placeholder = "Describe the image you want to generate...";
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        function createMessageBubble(role, content, type = 'text') {
            if (welcomeScreen && welcomeScreen.parentNode) {
                welcomeScreen.remove();
            }

            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full animate-fade-in ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            const bubbleContainer = document.createElement('div');
            bubbleContainer.className = `flex gap-3 max-w-[85%] sm:max-w-[75%] ${role === 'user' ? 'flex-row-reverse' : 'flex-row'}`;

            // Avatar
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center mt-1 shadow-md
                ${role === 'user' ? 'bg-gray-700' : 'bg-gradient-to-br from-primary-500 to-purple-600'}`;
            avatar.innerHTML = role === 'user' 
                ? '<i class="ph ph-user text-gray-300"></i>' 
                : '<i class="ph-fill ph-planet text-white"></i>';

            // Message Bubble
            const bubble = document.createElement('div');
            
            if (role === 'user') {
                bubble.className = 'bg-primary-600 text-white px-4 py-3 rounded-2xl rounded-tr-sm shadow-sm text-sm sm:text-base';
                bubble.textContent = content; // Plain text for user
            } else {
                bubble.className = 'glass-panel text-gray-100 px-5 py-4 rounded-2xl rounded-tl-sm shadow-sm text-sm sm:text-base w-full overflow-hidden';
                
                if (type === 'text') {
                    // Parse markdown and sanitize
                    const rawHtml = marked.parse(content);
                    const cleanHtml = DOMPurify.sanitize(rawHtml);
                    bubble.innerHTML = `<div class="markdown-content">${cleanHtml}</div>`;
                } else if (type === 'image') {
                    // Render image
                    bubble.innerHTML = `
                        <div class="space-y-2">
                            <p class="text-xs text-primary-400 font-medium mb-2"><i class="ph ph-image mr-1"></i> Generated Image</p>
                            <img src="${content}" alt="AI Generated Image" class="rounded-xl w-full max-w-md h-auto shadow-lg border border-gray-700 hover:scale-[1.02] transition-transform duration-300 cursor-pointer" onclick="window.open('${content}', '_blank')"/>
                        </div>
                    `;
                } else if (type === 'error') {
                    bubble.innerHTML = `<div class="text-red-400 flex items-center gap-2"><i class="ph-fill ph-warning-circle text-lg"></i> <span>${content}</span></div>`;
                }
            }

            bubbleContainer.appendChild(avatar);
            bubbleContainer.appendChild(bubble);
            wrapper.appendChild(bubbleContainer);
            chatContainer.appendChild(wrapper);
            
            scrollToBottom();
        }


        function showTypingIndicator(isImage = false) {
            if (welcomeScreen && welcomeScreen.parentNode) {
                welcomeScreen.remove();
            }

            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = `flex w-full justify-start animate-fade-in`;

            const bubbleContainer = document.createElement('div');
            bubbleContainer.className = `flex gap-3 max-w-[85%] flex-row`;

            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center mt-1 shadow-md bg-gradient-to-br from-primary-500 to-purple-600`;
            avatar.innerHTML = '<i class="ph-fill ph-planet text-white text-sm"></i>';

            const bubble = document.createElement('div');
            bubble.className = 'glass-panel text-gray-300 px-5 py-4 rounded-2xl rounded-tl-sm shadow-sm flex items-center gap-3';
            
            if (isImage) {
                bubble.innerHTML = `
                    <i class="ph ph-palette text-primary-400 animate-pulse text-lg"></i>
                    <span class="text-sm font-medium">Generating masterpiece</span>
                    <div class="flex gap-1">
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full dot"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full dot"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full dot"></div>
                    </div>
                `;
            } else {
                bubble.innerHTML = `
                    <div class="flex gap-1 items-center h-5">
                        <div class="w-2 h-2 bg-primary-400 rounded-full dot"></div>
                        <div class="w-2 h-2 bg-primary-400 rounded-full dot"></div>
                        <div class="w-2 h-2 bg-primary-400 rounded-full dot"></div>
                    </div>
                `;
            }

            bubbleContainer.appendChild(avatar);
            bubbleContainer.appendChild(bubble);
            wrapper.appendChild(bubbleContainer);
            chatContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function handleSend() {
            const prompt = userInput.value.trim();
            if (!prompt || isGenerating) return;

            // Reset input UI
            userInput.value = '';
            userInput.style.height = 'auto';
            isGenerating = true;
            sendBtn.disabled = true;

            // Render user message
            createMessageBubble('user', prompt);

            try {
                if (currentMode === 'text') {
                    await generateText(prompt);
                } else if (currentMode === 'image') {
                    await generateImage(prompt);
                }
            } catch (error) {
                console.error("API Error:", error);
                createMessageBubble('model', "I'm sorry, I encountered an error processing your request. Please try again.", 'error');
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }


        async function generateText(prompt) {
            showTypingIndicator(false);
            
            // Add user prompt to local memory history
            textChatHistory.push({ role: "user", parts: [{ text: prompt }] });

            const payload = {
                contents: textChatHistory,
                systemInstruction: systemInstruction
            };

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
            
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const result = await response.json();
            const candidate = result.candidates?.[0];
            
            removeTypingIndicator();

            if (candidate && candidate.content?.parts?.[0]?.text) {
                const aiResponseText = candidate.content.parts[0].text;
                
                // Add AI response to memory
                textChatHistory.push({ role: "model", parts: [{ text: aiResponseText }] });
                
                // Show in UI
                createMessageBubble('model', aiResponseText, 'text');
            } else {
                throw new Error("Unexpected API response structure.");
            }
        }

        async function generateImage(prompt) {
            showTypingIndicator(true);

            // Using the standard Imagen 3 endpoint for image generation
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${apiKey}`;
            
            const payload = {
                instances: [
                    { prompt: prompt }
                ],
                parameters: {
                    sampleCount: 1,
                    aspectRatio: "16:9" // Cinematic aspect ratio
                }
            };

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                removeTypingIndicator();
                const errData = await response.json();
                console.error("API Error details:", errData);
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const result = await response.json();
            
            removeTypingIndicator();

            // The Imagen 3 endpoint returns predictions array with bytesBase64Encoded
            if (result.predictions && result.predictions.length > 0 && result.predictions[0].bytesBase64Encoded) {
                const base64Data = result.predictions[0].bytesBase64Encoded;
                // Determine mime type (usually jpeg from this endpoint)
                const mimeType = result.predictions[0].mimeType || 'image/jpeg';
                const imageUrl = `data:${mimeType};base64,${base64Data}`;
                
                // Inform the text memory that an image was generated so it maintains context of what happened
                textChatHistory.push({ role: "user", parts: [{ text: `[I requested to generate an image with prompt: "${prompt}"]` }] });
                textChatHistory.push({ role: "model", parts: [{ text: `[I successfully generated an image for the prompt: "${prompt}"]` }] });

                // Show in UI
                createMessageBubble('model', imageUrl, 'image');
            } else {
                 console.error("Unexpected response structure:", result);
                 throw new Error("Failed to generate image: Invalid response format.");
            }
        }
    </script>
</body>
</html>
