<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن الكريم | The Holy Quran</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Amiri Font -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #111827; /* Dark Gray 900 */
            font-family: 'Amiri', serif;
            color: #e5e7eb; /* Gray 200 */
        }
        
        .quran-text {
            font-size: 32px;
            line-height: 2.8;
            text-align: justify;
            text-align-last: center;
            direction: rtl;
            word-spacing: 2px;
            color: #f3f4f6; /* Lighter text for dark mode */
        }

        .ayah-wrapper {
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            border-radius: 6px;
            padding: 2px 4px;
        }

        .ayah-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #22d3ee; /* Cyan 400 */
            margin: 0 4px;
            position: relative;
            font-family: Arial, sans-serif;
            width: 38px;
            height: 38px;
        }
        
        .ayah-number::before {
            content: "\06DD";
            font-size: 44px;
            position: absolute;
            color: #0891b2; /* Cyan 600 */
            opacity: 0.8;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .playing-active {
            background-color: rgba(8, 145, 178, 0.3) !important; /* Cyan transparent */
            color: #cffafe; /* Cyan 50 */
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
        }

        /* تصميم فاصل الصفحات للوضع الليلي */
        .page-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 60px 0;
            position: relative;
            width: 100%;
        }
        .page-divider::before, .page-divider::after {
            content: "";
            flex: 1;
            height: 2px;
            background: linear-gradient(to left, transparent, #4b5563, transparent); /* Gray 600 */
        }
        .page-label {
            background: #1f2937; /* Gray 800 */
            color: #22d3ee; /* Cyan 400 */
            padding: 8px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            margin: 0 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid #0891b2; /* Cyan 600 */
            display: flex;
            align-items: center;
            gap: 10px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; } /* Gray 800 */
        ::-webkit-scrollbar-thumb { background: #0891b2; border-radius: 4px; } /* Cyan 600 */
        ::-webkit-scrollbar-thumb:hover { background: #0e7490; } /* Cyan 700 */

        .loader {
            border: 4px solid #374151; /* Gray 700 */
            border-top: 4px solid #06b6d4; /* Cyan 500 */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .font-arabic { font-family: 'Amiri', serif; }
        
        .btn-disabled {
            opacity: 0.6;
            cursor: not-allowed !important;
            filter: grayscale(1);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-200 bg-gray-900">

    <!-- Header & Search -->
    <header class="bg-cyan-950 text-cyan-50 shadow-lg p-4 flex flex-col md:flex-row justify-between items-center z-10 gap-4 border-b border-cyan-900">
        <div class="flex items-center gap-3 text-2xl font-bold w-full md:w-auto justify-between flex-wrap">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-book-quran text-cyan-400"></i>
                <h1 id="appTitle">القرآن الكريم</h1>
            </div>
            <div class="flex items-center gap-2 mt-2 md:mt-0">
                <div class="flex items-center gap-1 md:gap-2 md:ms-6 bg-cyan-900 px-3 py-1 rounded-full text-sm">
                    <i class="fa-solid fa-globe hidden md:inline-block text-cyan-300"></i>
                    <select id="langSelect" onchange="changeLanguage(this.value)" class="bg-transparent text-cyan-50 outline-none cursor-pointer">
                        <option value="ar" class="text-gray-900">العربية</option>
                        <option value="en" class="text-gray-900">English</option>
                    </select>
                </div>
                <div class="flex items-center gap-1 md:gap-2 bg-cyan-900 px-3 py-1 rounded-full text-sm">
                    <i class="fa-solid fa-user-tie hidden md:inline-block text-cyan-300"></i>
                    <select id="reciterSelect" onchange="changeReciter(this.value)" class="bg-transparent text-cyan-50 outline-none cursor-pointer max-w-[110px] md:max-w-[160px] truncate">
                        <option value="ar.alafasy" class="text-gray-900">العفاسي</option>
                        <option value="ar.abdulbasitmujawwad" class="text-gray-900">عبد الباسط (مجود)</option>
                        <option value="ar.abdulbasitmurattal" class="text-gray-900">عبد الباسط (مرتل)</option>
                        <option value="ar.husary" class="text-gray-900">الحصري</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="w-full md:w-1/2 relative">
            <input type="text" id="searchInput" placeholder="ابحث عن سورة (مثال: الفاتحة) أو آية..." 
                class="w-full p-3 pe-10 rounded-full bg-gray-800 border-2 border-cyan-800 text-gray-100 placeholder-gray-400 focus:outline-none focus:border-cyan-400 text-lg transition-colors shadow-inner">
            <button onclick="performSearch()" class="absolute top-1/2 end-3 transform -translate-y-1/2 text-cyan-400 hover:text-cyan-300 bg-gray-800 rounded-full p-1">
                <i class="fa-solid fa-search text-xl"></i>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-full md:w-1/4 lg:w-1/5 bg-gray-800 border-e border-gray-700 overflow-y-auto hidden md:block transition-all duration-300" id="sidebar">
            <div class="p-4 bg-gray-900 sticky top-0 font-bold text-cyan-400 border-b border-gray-700 flex justify-between items-center z-10 shadow-sm">
                <span id="indexTitle">السور</span>
                <button class="md:hidden text-cyan-500 hover:text-cyan-300" onclick="toggleSidebar()"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <ul id="surahList" class="p-2 space-y-1"><div class="loader"></div></ul>
        </aside>

        <!-- Mobile Menu Button -->
        <button id="mobileMenuBtn" onclick="toggleSidebar()" class="md:hidden fixed bottom-6 end-6 bg-cyan-700 text-white p-4 rounded-full shadow-2xl z-50 hover:bg-cyan-600 transition-colors border-2 border-cyan-500">
            <i class="fa-solid fa-list-ul text-xl"></i>
        </button>

        <!-- Main Area -->
        <main class="w-full md:w-3/4 lg:w-4/5 p-4 md:p-8 overflow-y-auto relative bg-gray-900" id="mainContent">
            <div id="loadingScreen" class="hidden absolute inset-0 bg-gray-900/90 flex flex-col items-center justify-center z-20">
                <div class="loader"></div>
                <p id="loadingText" class="text-cyan-400 text-xl font-bold mt-4">جاري التحميل...</p>
            </div>

            <!-- Reading Container -->
            <div id="readingArea" class="max-w-4xl mx-auto bg-gray-800 p-6 md:p-12 shadow-2xl rounded-2xl border border-gray-700 min-h-full">
                <div class="text-center mb-6 border-b-2 border-cyan-800 pb-6 bg-gray-900 rounded-xl p-4 shadow-inner">
                    <h2 id="surahTitle" class="text-4xl font-bold text-cyan-400 mb-2 font-arabic"></h2>
                    <p id="surahType" class="text-cyan-600 text-lg font-bold"></p>
                </div>

                <div class="flex flex-wrap justify-center gap-4 mb-10 bg-gray-900 p-4 rounded-xl border border-gray-700 shadow-inner">
                    <button id="playBtn" onclick="toggleAudio()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-full flex items-center gap-2 transition shadow-md font-bold">
                        <i class="fa-solid fa-play" id="playIcon"></i> <span id="playBtnText">تشغيل التلاوة</span>
                    </button>
                    <button onclick="stopAudio()" class="bg-rose-600 hover:bg-rose-500 text-white px-6 py-3 rounded-full flex items-center gap-2 transition shadow-md font-bold">
                        <i class="fa-solid fa-stop"></i> <span id="stopBtnText">إيقاف</span>
                    </button>
                </div>
                
                <div id="bismillah" class="text-center text-3xl mb-10 text-cyan-400 font-bold hidden font-arabic drop-shadow-md">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                <div id="quranText" class="quran-text"></div>
            </div>

            <!-- Search Results Area -->
            <div id="searchResultsArea" class="max-w-4xl mx-auto hidden bg-gray-800 p-6 md:p-8 shadow-2xl rounded-2xl border border-gray-700 min-h-[50vh]">
                <div class="flex justify-between items-center mb-6 border-b-2 border-cyan-800 pb-4">
                    <h2 id="searchResultsTitle" class="text-2xl font-bold text-cyan-400">نتائج البحث</h2>
                    <button onclick="closeSearch()" class="text-rose-500 hover:text-rose-400 font-bold flex items-center gap-2 bg-gray-900 px-4 py-2 rounded-lg border border-gray-700"><i class="fa-solid fa-times"></i> <span id="closeSearchText">إغلاق</span></button>
                </div>
                <div id="searchResultsList" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = 'https://api.alquran.cloud/v1'; 
        const CDN_AUDIO_URL = 'https://cdn.islamic.network/quran/audio/64'; 

        const i18n = {
            ar: { title: "القرآن الكريم", searchPlaceholder: "ابحث عن سورة (مثال: الفاتحة) أو آية...", indexTitle: "السور", loading: "جاري التحميل...", play: "تشغيل التلاوة", pause: "إيقاف مؤقت", stop: "إيقاف", closeSearch: "إغلاق البحث", meccan: "سورة مكية", medinan: "سورة مدنية", ayahsCount: "آياتها", searchResultsFor: "نتائج البحث عن", noResults: "لم يتم العثور على نتائج. تأكد من الكلمة وحاول مرة أخرى.", errorLoading: "حدث خطأ في تحميل البيانات. يرجى المحاولة مرة أخرى.", surahMatch: "نتيجة مطابقة لاسم السورة", openSurah: "فتح السورة", reciterAlafasy: "العفاسي", reciterAbdulbasit: "عبد الباسط (مجود)", reciterAbdulbasitMurattal: "عبد الباسط (مرتل)", reciterHusary: "الحصري", pageLabel: "الصفحة" },
            en: { title: "The Holy Quran", searchPlaceholder: "Search Surah (e.g. Fatiha) or Ayah...", indexTitle: "Surahs", loading: "Loading...", play: "Play Audio", pause: "Pause", stop: "Stop", closeSearch: "Close Search", meccan: "Meccan Surah", medinan: "Medinan Surah", ayahsCount: "Ayahs", searchResultsFor: "Search Results for", noResults: "No results found. Please try a different keyword.", errorLoading: "Data loading error. Please try again.", surahMatch: "Surah Name Match", openSurah: "Open Surah", reciterAlafasy: "Alafasy", reciterAbdulbasit: "Abdul Basit (Mujawwad)", reciterAbdulbasitMurattal: "Abdul Basit (Murattal)", reciterHusary: "Al-Husary", pageLabel: "Page" }
        };

        let currentLang = 'ar', currentReciter = 'ar.alafasy', surahsMetaData = [], currentSurahData = null;
        let audioPlayer = new Audio(), audioList = [], currentAudioIndex = 0, isPlaying = false, isAudioReady = false;
        
        let consecutiveErrors = 0;
        let errorTimeout = null;

        const elements = {
            appTitle: document.getElementById('appTitle'), searchInput: document.getElementById('searchInput'), indexTitle: document.getElementById('indexTitle'), loadingText: document.getElementById('loadingText'),
            playBtnText: document.getElementById('playBtnText'), stopBtnText: document.getElementById('stopBtnText'), closeSearchText: document.getElementById('closeSearchText'), surahList: document.getElementById('surahList'),
            quranText: document.getElementById('quranText'), surahTitle: document.getElementById('surahTitle'), surahType: document.getElementById('surahType'), bismillah: document.getElementById('bismillah'),
            readingArea: document.getElementById('readingArea'), searchResultsArea: document.getElementById('searchResultsArea'), searchResultsList: document.getElementById('searchResultsList'),
            searchResultsTitle: document.getElementById('searchResultsTitle'), loadingScreen: document.getElementById('loadingScreen'), sidebar: document.getElementById('sidebar'), playIcon: document.getElementById('playIcon'),
            langSelect: document.getElementById('langSelect'), reciterSelect: document.getElementById('reciterSelect'), playBtn: document.getElementById('playBtn')
        };

        window.onload = () => {
            const savedLang = localStorage.getItem('quranLang') || 'ar';
            elements.langSelect.value = savedLang;
            changeLanguage(savedLang);
            const savedReciter = localStorage.getItem('quranReciter') || 'ar.alafasy';
            currentReciter = savedReciter;
            elements.reciterSelect.value = savedReciter;
            
            audioPlayer.addEventListener('ended', playNextAyah);
            audioPlayer.addEventListener('error', () => { handlePlaybackError(); });
        };

        function handlePlaybackError() {
            console.warn("Audio file skipped or failed");
            clearTimeout(errorTimeout);
            consecutiveErrors++;

            if (consecutiveErrors > 3) {
                stopAudio();
                elements.playBtnText.textContent = currentLang === 'ar' ? 'التلاوة غير متوفرة' : 'Audio Unavailable';
                elements.playIcon.className = "fa-solid fa-triangle-exclamation text-rose-400";
                return;
            }

            errorTimeout = setTimeout(() => {
                if (isPlaying) playNextAyah();
            }, 400);
        }

        function changeLanguage(lang) {
            currentLang = lang; localStorage.setItem('quranLang', lang);
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            
            elements.appTitle.textContent = i18n[lang].title;
            elements.searchInput.placeholder = i18n[lang].searchPlaceholder;
            elements.indexTitle.textContent = i18n[lang].indexTitle;
            elements.loadingText.textContent = i18n[lang].loading;
            elements.stopBtnText.textContent = i18n[lang].stop; elements.closeSearchText.textContent = i18n[lang].closeSearch;
            
            elements.reciterSelect.options[0].text = i18n[lang].reciterAlafasy; 
            elements.reciterSelect.options[1].text = i18n[lang].reciterAbdulbasit;
            elements.reciterSelect.options[2].text = i18n[lang].reciterAbdulbasitMurattal;
            elements.reciterSelect.options[3].text = i18n[lang].reciterHusary;
            
            updatePlayButtonUI();
            stopAudio();
            
            if(surahsMetaData.length === 0) fetchSurahList();
            else { renderSurahList(surahsMetaData); if(currentSurahData) renderCurrentSurah(); }
        }

        function changeReciter(reciterId) {
            currentReciter = reciterId; localStorage.setItem('quranReciter', reciterId);
            stopAudio();
            if (currentSurahData && currentSurahData.ar) {
                buildAudioList();
            }
        }

        async function fetchSurahList() {
            try {
                const response = await fetch(`${API_BASE_URL}/meta`);
                const data = await response.json();
                if(data.code === 200) { surahsMetaData = data.data.surahs.references; renderSurahList(surahsMetaData); loadSurah(1); }
            } catch (error) { elements.surahList.innerHTML = `<li class="text-rose-400 p-4 font-bold">Error loading index.</li>`; }
        }

        function localizeNumber(num) {
            if (currentLang === 'en') return num;
            return String(num).replace(/[0-9]/g, w => ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'][+w]);
        }

        function renderSurahList(surahs) {
            elements.surahList.innerHTML = '';
            surahs.forEach(surah => {
                const li = document.createElement('li');
                li.className = 'p-3 hover:bg-gray-700 cursor-pointer rounded-lg transition-colors flex justify-between items-center text-lg font-bold text-gray-200 mb-1 border border-transparent';
                li.innerHTML = `<span class="font-arabic">${currentLang === 'ar' ? surah.name : surah.englishName}</span><span class="text-sm bg-cyan-700 text-white rounded-full w-8 h-8 flex items-center justify-center">${localizeNumber(surah.number)}</span>`;
                li.onclick = () => { loadSurah(surah.number); if(window.innerWidth < 768) toggleSidebar(); };
                elements.surahList.appendChild(li);
            });
        }

        function buildAudioList() {
            if (!currentSurahData || !currentSurahData.ar) return;
            audioList = currentSurahData.ar.ayahs.map(ayah => 
                `${CDN_AUDIO_URL}/${currentReciter}/${ayah.number}.mp3`
            );
            isAudioReady = true;
            elements.playBtn.classList.remove('btn-disabled');
            updatePlayButtonUI();
        }

        async function loadSurah(surahNumber) {
            toggleLoading(true); stopAudio(); closeSearch();
            isAudioReady = false; 
            elements.playBtn.classList.add('btn-disabled');
            audioList = [];

            try {
                const textResponse = await fetch(`${API_BASE_URL}/surah/${surahNumber}/editions/quran-uthmani,en.sahih`);
                const textData = await textResponse.json();
                
                if(textData.code === 200) {
                    currentSurahData = { ar: textData.data[0], en: textData.data[1] };
                    renderCurrentSurah();
                    buildAudioList();
                }
            } catch (error) { 
                elements.quranText.innerHTML = `<div class="p-4 bg-rose-900/50 text-rose-300 rounded-xl font-bold text-center border border-rose-800">${i18n[currentLang].errorLoading}</div>`;
            } finally { 
                toggleLoading(false); 
            }
        }

        function renderCurrentSurah() {
            if(!currentSurahData) return;
            const arSurah = currentSurahData.ar, enSurah = currentSurahData.en;
            elements.surahTitle.textContent = currentLang === 'ar' ? arSurah.name : enSurah.englishName;
            elements.surahType.textContent = `${arSurah.revelationType === 'Meccan' ? i18n[currentLang].meccan : i18n[currentLang].medinan} - ${i18n[currentLang].ayahsCount} ${localizeNumber(arSurah.numberOfAyahs)}`;
            elements.bismillah.style.display = (arSurah.number !== 1 && arSurah.number !== 9) ? 'block' : 'none';

            let textHtml = '', lastPage = -1;
            for (let i = 0; i < arSurah.ayahs.length; i++) {
                const ayah = arSurah.ayahs[i];
                
                if (ayah.page !== lastPage) {
                    textHtml += `<div class="page-divider"><span class="page-label"><i class="fa-solid fa-book-open"></i> ${i18n[currentLang].pageLabel} ${localizeNumber(ayah.page)}</span></div>`;
                    lastPage = ayah.page;
                }

                let arText = ayah.text;
                if (arSurah.number !== 1 && i === 0) arText = arText.replace(/^بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ /, '');

                if (currentLang === 'ar') {
                    textHtml += `<span id="ayah-${i}" class="ayah-wrapper">${arText} <span class="ayah-number font-sans">${localizeNumber(i + 1)}</span></span> `;
                } else {
                    textHtml += `
                        <div id="ayah-${i}" class="ayah-wrapper p-6 mb-4 bg-gray-900/50 rounded-xl border border-gray-700">
                            <div class="text-right mb-4 text-3xl font-arabic text-cyan-100" dir="rtl">${arText} <span class="ayah-number">${localizeNumber(i + 1)}</span></div>
                            <div class="text-left text-xl text-gray-400 font-sans leading-relaxed" dir="ltr">${enSurah.ayahs[i].text}</div>
                        </div>`;
                }
            }
            elements.quranText.innerHTML = textHtml;
            document.getElementById('mainContent').scrollTop = 0;
        }

        function toggleAudio() {
            if (!isAudioReady || audioList.length === 0) return;
            if (isPlaying) { audioPlayer.pause(); isPlaying = false; updatePlayButtonUI(); }
            else { playAyah(currentAudioIndex); }
        }

        function playAyah(index) {
            if (index >= audioList.length) { stopAudio(); return; }
            
            audioPlayer.src = audioList[index];
            const p = audioPlayer.play();
            if (p !== undefined) {
                p.then(() => { 
                    consecutiveErrors = 0; 
                    isPlaying = true; 
                    currentAudioIndex = index; 
                    updatePlayButtonUI(); 
                    highlightAyah(index); 
                }).catch(e => { 
                    if(e.name !== 'AbortError') handlePlaybackError();
                });
            }
        }
        
        function playNextAyah() { playAyah(currentAudioIndex + 1); }
        function stopAudio() { 
            audioPlayer.pause(); 
            audioPlayer.currentTime = 0; 
            isPlaying = false; 
            currentAudioIndex = 0; 
            consecutiveErrors = 0;
            clearTimeout(errorTimeout);
            updatePlayButtonUI(); 
            highlightAyah(-1); 
        }
        
        function updatePlayButtonUI() {
            elements.playIcon.className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
            elements.playBtnText.textContent = isPlaying ? i18n[currentLang].pause : i18n[currentLang].play;
        }

        function highlightAyah(index) {
            document.querySelectorAll('.ayah-wrapper').forEach(el => el.classList.remove('playing-active'));
            if (index >= 0) {
                const el = document.getElementById(`ayah-${index}`);
                if (el) { el.classList.add('playing-active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            }
        }

        function normalizeSearchText(t) {
            if (!t) return '';
            return t.replace(/[\u0600-\u061A\u064B-\u065F\u0670\u06D6-\u06DC\u06DF-\u06E8\u06EA-\u06ED]/g, '')
                    .replace(/[أإآٱ]/g, 'ا').replace(/ة/g, 'ه').replace(/[ىي]/g, 'ي')
                    .replace(/^(سوره|سورة|Al-|El-|The\s)/gi, '')
                    .replace(/\s+/g, '').toLowerCase();
        }

        async function performSearch() {
            const raw = elements.searchInput.value.trim(); if (!raw) return;
            toggleLoading(true); elements.readingArea.style.display = 'none'; elements.searchResultsArea.style.display = 'block'; elements.searchResultsList.innerHTML = '';
            elements.searchResultsTitle.innerHTML = `${i18n[currentLang].searchResultsFor}: "<span class="text-cyan-400">${raw}</span>"`;
            try {
                const norm = normalizeSearchText(raw);
                const ms = surahsMetaData.filter(s => normalizeSearchText(s.name).includes(norm) || normalizeSearchText(s.englishName).includes(norm));
                if (ms.length > 0) {
                    ms.forEach(s => {
                        const d = document.createElement('div'); d.className = 'bg-gray-800 p-6 rounded-xl shadow border-2 border-cyan-700 hover:bg-gray-700 cursor-pointer mb-4 flex justify-between items-center';
                        d.innerHTML = `<div><div class="text-sm font-bold text-cyan-500 mb-2"><i class="fa-solid fa-star text-amber-400 mx-1"></i> ${i18n[currentLang].surahMatch}</div><div class="text-3xl font-bold font-arabic text-gray-100">${currentLang === 'ar' ? s.name : s.englishName}</div></div><button class="bg-cyan-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-cyan-500 transition-colors">${i18n[currentLang].openSurah}</button>`;
                        d.onclick = () => { elements.searchInput.value = ''; loadSurah(s.number); };
                        elements.searchResultsList.appendChild(d);
                    });
                }
                const res = await fetch(`${API_BASE_URL}/search/${encodeURIComponent(raw)}/all/${currentLang === 'ar' ? 'ar.quran' : 'en.sahih'}`);
                const data = await res.json();
                if (data.code === 200 && data.data.count > 0) {
                    data.data.matches.forEach(m => {
                        const d = document.createElement('div'); d.className = 'bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 hover:border-cyan-600 transition-colors cursor-pointer border-s-4 border-s-cyan-500 mt-4';
                        d.innerHTML = `<div class="flex justify-between items-center mb-4 text-cyan-400 text-sm border-b border-gray-700 pb-3"><span class="font-bold flex items-center text-lg font-arabic"><i class="fa-solid fa-book-open mx-2"></i> ${currentLang === 'ar' ? m.surah.name : m.surah.englishName}</span><span class="bg-gray-900 border border-gray-700 px-3 py-1 rounded-full text-gray-300">${i18n[currentLang].ayahsCount} ${localizeNumber(m.numberInSurah)}</span></div><div class="${currentLang === 'ar' ? 'quran-text text-right' : 'text-xl text-left font-sans'} mt-2 text-gray-200">${m.text.replace(new RegExp(raw, 'gi'), `<span class="bg-cyan-900 text-cyan-100 px-1 rounded shadow-sm">$&</span>`)} <span class="ayah-number">${localizeNumber(m.numberInSurah)}</span></div>`;
                        d.onclick = () => { elements.searchInput.value = ''; loadSurah(m.surah.number); };
                        elements.searchResultsList.appendChild(d);
                    });
                } else if (ms.length === 0) { elements.searchResultsList.innerHTML = `<div class="p-12 text-center text-gray-400 font-bold">${i18n[currentLang].noResults}</div>`; }
            } catch (e) { elements.searchResultsList.innerHTML = `<div class="p-6 bg-rose-900/50 text-rose-300 rounded-xl border border-rose-800 text-center">${i18n[currentLang].errorLoading}</div>`; } finally { toggleLoading(false); }
        }

        function closeSearch() { elements.searchResultsArea.style.display = 'none'; elements.readingArea.style.display = 'block'; elements.searchInput.value = ''; }
        function toggleLoading(s) { elements.loadingScreen.style.display = s ? 'flex' : 'none'; }
        function toggleSidebar() {
            if(elements.sidebar.classList.contains('hidden')) { elements.sidebar.classList.remove('hidden'); elements.sidebar.classList.add('fixed', 'inset-y-0', 'right-0', 'z-40', 'w-4/5', 'max-w-sm', 'shadow-2xl'); }
            else { elements.sidebar.classList.add('hidden'); elements.sidebar.classList.remove('fixed', 'inset-y-0', 'right-0', 'z-40', 'w-4/5', 'max-w-sm', 'shadow-2xl'); }
        }
        elements.searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });
    </script>
</body>
</html>
